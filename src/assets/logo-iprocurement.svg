<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title>iProcurement Project Icon Dark Mode</title>
  <desc>Icon-only dark mode logo mark with a geometric procurement workflow monogram in purple, coral, orange, and sand.</desc>
  <defs>
    <linearGradient id="projectOuter" x1="134" y1="112" x2="382" y2="397" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4F59"/>
      <stop offset="0.58" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FFB263"/>
    </linearGradient>
    <linearGradient id="projectInner" x1="145" y1="363" x2="294" y2="152" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2A205E"/>
      <stop offset="0.52" stop-color="#3A2A78"/>
      <stop offset="1" stop-color="#5F4BBC"/>
    </linearGradient>
    <linearGradient id="sandGrad" x1="170" y1="364" x2="318" y2="197" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#CDBD9F"/>
      <stop offset="1" stop-color="#F3E8D4"/>
    </linearGradient>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#FF7043" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#6B4FE3" flood-opacity="0.20"/>
    </filter>
    <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="104" fill="#0C0A1D"/>
  <circle cx="256" cy="256" r="190" fill="url(#projectOuter)" opacity="0.08"/>
  <circle cx="256" cy="256" r="132" fill="#FFFFFF" opacity="0.025"/>

  <g filter="url(#softGlow)">
    <!-- Outer procurement loop / governance path -->
    <path d="M250.9 75.4c9.3-5.4 20.8-5.4 30.1 0l99.1 57.2c9.3 5.4 15.1 15.3 15.1 26.1v114.5c0 10.8-5.8 20.7-15.1 26.1l-63.4 36.6V273l25.1-14.5c4.7-2.7 7.6-7.7 7.6-13.1v-59.1c0-5.4-2.9-10.4-7.6-13.1l-60.8-35.1c-9.3-5.4-20.8-5.4-30.1 0l-73 42.1-49.5-28.6 122.5-76.2Z" fill="url(#projectOuter)"/>
    <!-- Left intelligent i-stem / intake path -->
    <path d="M126.7 223.2c0-11 5.9-21.2 15.5-26.7l37.2-21.5v187.5l-37.2-21.5c-9.6-5.5-15.5-15.7-15.5-26.7v-91.1Z" fill="url(#projectInner)"/>
    
        <circle cx="142" cy="178" r="8" fill="url(#projectInner)"/>
        
    <!-- Central P / action gateway -->
    <path d="M205.4 201.8c0-8.7 4.6-16.7 12.1-21l46.4-26.8c7.5-4.3 16.8-4.3 24.3 0l35.9 20.7c16.3 9.4 16.3 32.9 0 42.3l-69.4 40.1v-42.6l30.5-17.6c3.1-1.8 3.1-6.3 0-8.1l-9.2-5.3c-3.1-1.8-6.9-1.8-10 0l-25.5 14.7c-3.1 1.8-5 5.1-5 8.7v179.4l-30.1-17.4V201.8Z" fill="url(#projectInner)" filter="url(#innerShadow)"/>
    <!-- Sand bridge showing controlled handoff -->
    <path d="M254.7 257.1l69.4-40.1c7.9-4.6 11.9-12.6 11.9-20.7v88.2c0 8.7-4.6 16.7-12.1 21l-69.2 39.9v-88.3Z" fill="url(#sandGrad)" opacity="0.92"/>
  </g>

  <path d="M153 404h206" stroke="url(#projectOuter)" stroke-width="3" stroke-linecap="round" opacity="0.32"/>
</svg>